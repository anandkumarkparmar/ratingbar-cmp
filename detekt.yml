build:
  maxIssues: 0

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 24
    constructorThreshold: 12
  LongMethod:
    active: true
    threshold: 200
  CyclomaticComplexMethod:
    active: true
    threshold: 40
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15

coroutines:
  active: true

exceptions:
  active: true

naming:
  active: true
  FunctionNaming:
    active: true
    # Allow composable naming convention (PascalCase)
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 3
  WildcardImport:
    active: true
    excludeImports:
      - 'androidx.compose.runtime.*'
      - 'androidx.compose.ui.semantics.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.ui.input.key.*'
