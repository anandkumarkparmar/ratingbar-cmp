name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: JVM & JS
          - os: ubuntu-latest
            name: "Linux (JVM/JS)"
            gradle-args: "build -x iosX64Test -x iosArm64Test -x iosSimulatorArm64Test"
          
          # macOS: All targets
          - os: macos-latest
            name: "macOS (JVM/JS/iOS)"
            gradle-args: "build"

    name: Build - ${{ matrix.name }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Build all modules
        run: ./gradlew ${{ matrix.gradle-args }} --stacktrace
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            **/build/reports/tests/
            **/build/test-results/

  jitpack-check:
    runs-on: ubuntu-latest
    name: JitPack Compatibility
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Validate JitPack publication task
        run: ./gradlew clean :ratingbar-cmp:publishToMavenLocal -x test --stacktrace

      - name: Build Android release artifact
        run: ./gradlew :ratingbar-cmp:assembleRelease -x test --stacktrace

      - name: Generate artifact size matrix
        env:
          MAX_ANDROID_AAR_BYTES: 51200
          MAX_TOTAL_PUBLISHED_BYTES: 5242880
        run: |
          chmod +x scripts/report-artifact-sizes.sh
          ./scripts/report-artifact-sizes.sh --enforce

      - name: Publish artifact size summary
        run: |
          cat .github/artifact-size-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact size report
        uses: actions/upload-artifact@v4
        with:
          name: artifact-size-report
          path: |
            .github/artifact-size-report.md
            .github/artifact-size-summary.env
            .github/badges/android-aar-size.json
            .github/badges/desktop-published-size.json
            .github/badges/ios-published-size.json
            .github/badges/web-published-size.json
            .github/badges/total-published-size.json

  test-summary:
    runs-on: ubuntu-latest
    name: Test Summary
    if: always()
    needs: [ build-and-verify, jitpack-check ]
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
        continue-on-error: true
      
      - name: Publish test results summary
        run: |
          echo "## Build & Test Results"
          echo "✅ CI completed"
          if [ "${{ needs.build-and-verify.result }}" == 'failure' ] || [ "${{ needs.jitpack-check.result }}" == 'failure' ]; then
            echo "❌ Build or JitPack compatibility checks failed"
            exit 1
          fi
        continue-on-error: true
